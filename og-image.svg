<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0f0f23;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="200" r="150" fill="#0f0f23" opacity="0.08" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="100" fill="#0f0f23" opacity="0.05" filter="url(#glow)"/>

  <!-- Accent line -->
  <rect x="80" y="520" width="200" height="4" rx="2" fill="url(#accent)"/>

  <!-- Emoji -->
  <text x="600" y="240" text-anchor="middle" font-size="120">🎯</text>

  <!-- Title -->
  <text x="600" y="370" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="700" fill="white">별자리 궁합 테스트 - 12별자리</text>

  <!-- Brand -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" fill="#0f0f23" opacity="0.9">dopabrain.com</text>

  <!-- Bottom bar -->
  <rect x="0" y="620" width="1200" height="10" fill="#0f0f23" opacity="0.6"/>
</svg>